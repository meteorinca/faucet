<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transistor Faucet Analogy</title>

    <style>
        :root {
            --bg: #0b0d14;
            --panel-bg: #121520;
            --border: #1f2335;
            --text: #e2e4ec;
            --text-dim: #8b92a5;
            --accent-water: #0ea5e9;
            --accent-water-glow: #38bdf8;
            --accent-electron: #eab308;
            --accent-electron-glow: #fde047;
            --accent-base: #8b5cf6;
            --slider-track: #1e2132;
            --font-mono: 'SF Mono', 'Fira Code', monospace;
            --font-sans: 'Inter', system-ui, sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg); font-family: var(--font-sans); color: var(--text);
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .app { display: flex; flex-direction: column; height: 100vh; }

        .header {
            display: flex; align-items: center; justify-content: center;
            padding: 20px; gap: 12px; z-index: 10;
        }

        .logo-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent-water);
            box-shadow: 0 0 15px var(--accent-water-glow);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { box-shadow: 0 0 10px var(--accent-water-glow); }
            to { box-shadow: 0 0 25px var(--accent-water-glow), 0 0 10px white; }
        }

        .header h1 { font-size: 1.2rem; font-weight: 600; }
        
        .badge {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            color: var(--accent-base); background: rgba(139, 92, 246, 0.15);
            padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .panels {
            flex: 1; display: flex; background: var(--border);
            gap: 1px; position: relative;
        }

        .panel {
            flex: 1; position: relative; background: var(--panel-bg);
            display: flex; justify-content: center; align-items: center;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .panel-label {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
            color: var(--text-dim); background: rgba(18, 21, 32, 0.85);
            padding: 6px 16px; border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05); z-index: 5;
        }

        .value-readout {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            font-family: var(--font-mono); font-size: 0.85rem; font-weight: 500;
            background: rgba(18, 21, 32, 0.9); padding: 8px 20px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); z-index: 5;
        }

        .water-panel .value-readout { color: var(--accent-water-glow); }
        .transistor-panel .value-readout { color: var(--accent-electron-glow); }

        .divider-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 2px; height: 70%; transition: var(--transition); z-index: 6;
        }

        .divider-glow.active {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
        }

        .control-bar {
            display: flex; justify-content: center; align-items: center; gap: 30px;
            padding: 24px; background: var(--panel-bg); border-top: 1px solid var(--border);
        }

        .control-label { font-size: 0.75rem; font-weight: 600; color: var(--text-dim); text-align: right; }

        .slider-container { position: relative; width: 250px; }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 8px;
            border-radius: 4px; background: var(--slider-track); outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%;
            background: #fff; cursor: pointer; border: 3px solid var(--accent-base);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5); transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.15); }

        .slider-ticks {
            display: flex; justify-content: space-between; position: absolute;
            top: 25px; width: 100%; font-size: 0.6rem; color: var(--text-dim); font-weight: 600;
        }

        .region-indicator {
            font-family: var(--font-mono); font-size: 0.75rem; font-weight: 600;
            padding: 8px 16px; border-radius: 8px; width: 110px; text-align: center;
        }

        .region-indicator.cutoff { background: rgba(139, 146, 165, 0.1); color: #8b92a5; }
        .region-indicator.active { background: rgba(14, 165, 233, 0.15); color: #38bdf8; }
        .region-indicator.saturation { background: rgba(234, 179, 8, 0.15); color: #fde047; }

        @media (max-width: 768px) {
            .panels { flex-direction: column; }
            .divider-glow { width: 70%; height: 2px; }
            .control-bar { padding: 16px; flex-wrap: wrap; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo-dot"></div>
            <h1>Transistor · Faucet Analogy</h1>
            <span class="badge">Interactive</span>
        </div>

        <div class="panels" id="panelsContainer">
            <div class="panel water-panel" id="waterPanel">
                <canvas id="faucetCanvas"></canvas>
                <span class="panel-label">💧 Faucet</span>
                <span class="value-readout" id="waterReadout">Flow: 0.0 L/s</span>
            </div>
            <div class="divider-glow" id="dividerGlow"></div>
            <div class="panel transistor-panel" id="transistorPanel">
                <canvas id="transistorCanvas"></canvas>
                <span class="panel-label">⚡ NPN Transistor</span>
                <span class="value-readout" id="transistorReadout">Ic: 0.00 mA</span>
            </div>
        </div>

        <div class="control-bar">
            <span class="control-label">Base Current<br>(Handle)</span>
            <div class="slider-container">
                <input type="range" id="baseSlider" min="0" max="1000" value="0">
                <div class="slider-ticks">
                    <span>CUTOFF</span><span>ACTIVE</span><span>SATURATION</span>
                </div>
            </div>
            <span class="region-indicator cutoff" id="regionIndicator">CUTOFF</span>
        </div>
    </div>

    <script>
        const faucetCanvas = document.getElementById('faucetCanvas');
        const transCanvas = document.getElementById('transistorCanvas');
        const fCtx = faucetCanvas.getContext('2d');
        const tCtx = transCanvas.getContext('2d');
        
        let slider = document.getElementById('baseSlider');
        let dpr = Math.min(window.devicePixelRatio || 1, 2);
        let fW, fH, tW, tH;
        let flowVal = 0;

        function resize() {
            const fRect = faucetCanvas.parentElement.getBoundingClientRect();
            fW = fRect.width; fH = fRect.height;
            faucetCanvas.width = fW * dpr; faucetCanvas.height = fH * dpr;
            fCtx.scale(dpr, dpr);

            const tRect = transCanvas.parentElement.getBoundingClientRect();
            tW = tRect.width; tH = tRect.height;
            transCanvas.width = tW * dpr; transCanvas.height = tH * dpr;
            tCtx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        // Smoother Water Physics
        class Particle {
            constructor() { this.alive = false; }
            spawn(x, y, flow) {
                this.x = x + (Math.random() - 0.5) * 10 * flow;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 15 * flow;
                this.vy = 50 + flow * 300;
                this.life = 1;
                this.size = 2 + Math.random() * 3;
                this.alive = true;
            }
            update(dt, flow) {
                if(!this.alive) return;
                this.vy += 600 * dt; // Gravity
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.life -= dt * 0.8;
                if(this.life <= 0 || this.y > fH) this.alive = false;
            }
            draw(ctx) {
                if(!this.alive) return;
                ctx.fillStyle = `rgba(56, 189, 248, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        const water = Array.from({length: 400}, () => new Particle());

        function drawSleekFaucet(ctx, w, h, flow) {
            const cx = w * 0.5;
            const neckTop = h * 0.2;
            const spoutY = h * 0.45;
            const pipeW = w * 0.06;
            
            ctx.save();
            // Gooseneck Pipe
            ctx.strokeStyle = '#4a5568';
            ctx.lineWidth = pipeW;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            ctx.moveTo(cx - w*0.1, h * 0.05);
            ctx.lineTo(cx - w*0.1, neckTop);
            ctx.quadraticCurveTo(cx - w*0.1, spoutY - h*0.05, cx, spoutY);
            ctx.stroke();

            // Valve & Handle
            const handleAngle = -Math.PI / 2 + flow * (Math.PI / 2);
            ctx.translate(cx - w*0.1, neckTop + h*0.05);
            ctx.rotate(handleAngle);
            
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(0, -pipeW*0.3, w*0.12, pipeW*0.6);
            ctx.beginPath();
            ctx.arc(w*0.12, 0, pipeW*0.5, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();

            // Basin (Sleek Ellipse)
            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.ellipse(cx, h*0.8, w*0.25, h*0.08, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Pool
            if(flow > 0) {
                ctx.fillStyle = `rgba(14, 165, 233, ${0.4 + flow*0.4})`;
                ctx.beginPath();
                ctx.ellipse(cx, h*0.8, (w*0.23) * (0.5+flow*0.5), (h*0.06) * (0.5+flow*0.5), 0, 0, Math.PI*2);
                ctx.fill();
            }

            return { x: cx, y: spoutY + pipeW/2 };
        }

        let lastTime = performance.now();
        
        function render(now) {
            let dt = (now - lastTime) / 1000;
            lastTime = now;
            if(dt > 0.1) dt = 0.1;

            // Target smoothing
            let targetFlow = slider.value / 1000;
            flowVal += (targetFlow - flowVal) * 10 * dt;

            // --- Faucet Render ---
            fCtx.clearRect(0, 0, fW, fH);
            let spout = drawSleekFaucet(fCtx, fW, fH, flowVal);

            if(flowVal > 0.05) {
                let spawnCount = Math.floor(flowVal * 10);
                for(let i=0; i<spawnCount; i++) {
                    let p = water.find(p => !p.alive);
                    if(p) p.spawn(spout.x, spout.y, flowVal);
                }
            }

            water.forEach(p => {
                p.update(dt, flowVal);
                p.draw(fCtx);
            });

            // Update UI Readouts
            document.getElementById('waterReadout').innerText = `Flow: ${(flowVal * 5).toFixed(1)} L/s`;
            document.getElementById('transistorReadout').innerText = `Ic: ${(flowVal * 15).toFixed(2)} mA`;
            
            let ind = document.getElementById('regionIndicator');
            ind.className = 'region-indicator ' + (flowVal < 0.05 ? 'cutoff' : flowVal < 0.9 ? 'active' : 'saturation');
            ind.innerText = flowVal < 0.05 ? 'CUTOFF' : flowVal < 0.9 ? 'ACTIVE' : 'SATURATION';

            document.getElementById('dividerGlow').classList.toggle('active', flowVal > 0.1);

            requestAnimationFrame(render);
        }

        requestAnimationFrame(render);
    </script>
</body>
</html>
