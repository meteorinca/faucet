<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transistor Animation</title>
    <style>
        body {
            background-color: #151515;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .transistor-wrapper {
            width: 100%;
            max-width: 650px;
            padding: 20px;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Base styles for static elements */
        .static-circle {
            fill: none;
            stroke: #8c8c8c;
            stroke-width: 3;
        }

        .label {
            fill: #ffffff;
            font-size: 20px;
            font-weight: 600;
        }

        .input-text { fill: #9b51e0; } /* Purple text */
        .output-text { fill: #5dade2; } /* Blue text */
        .value-text { font-family: monospace; font-size: 22px; }

        /* --- State 0 (Solid Grey Lines) --- */
        .state-0-lines {
            stroke: #b0b0b0;
            stroke-width: 9;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .text-state-0 {
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        /* --- State 1 (Colored Dashed Lines) --- */
        .state-1-lines {
            stroke-width: 9;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .state-1-control {
            stroke: #9b51e0; /* Purple */
            stroke-dasharray: 8 12;
        }

        .state-1-inner {
            stroke: #5dade2; /* Blue */
            stroke-dasharray: 8 12;
        }

        .text-state-1 {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* --- State Activation using Attribute Selector --- */
        /* When state is 0 */
        svg[data-state="0"] .state-0-lines { opacity: 1; }
        svg[data-state="0"] .text-state-0 { opacity: 1; }
        svg[data-state="0"] .state-1-lines { opacity: 0; }
        svg[data-state="0"] .text-state-1 { opacity: 0; }

        /* When state is 1 */
        svg[data-state="1"] .state-0-lines { opacity: 0; }
        svg[data-state="1"] .text-state-0 { opacity: 0; }
        svg[data-state="1"] .state-1-lines { opacity: 1; }
        svg[data-state="1"] .text-state-1 { opacity: 1; }

        /* --- Dash Flow Animation for State 1 --- */
        @keyframes flow {
            to {
                stroke-dashoffset: -20;
            }
        }

        svg[data-state="1"] .state-1-control,
        svg[data-state="1"] .state-1-inner {
            animation: flow 0.8s linear infinite;
        }
    </style>
</head>
<body>

    <div class="transistor-wrapper">
        <svg viewBox="0 0 600 500" class="transistor" data-state="0">
            
            <!-- Static Circle -->
            <circle class="static-circle" cx="350" cy="250" r="90" />

            <!-- STATE 0 LINES (Solid Grey) -->
            <g class="state-0-lines">
                <line x1="50" y1="250" x2="290" y2="250" /> <!-- Control Wire -->
                <line x1="290" y1="190" x2="290" y2="310" /> <!-- Base Junction -->
                <polyline points="290,190 340,140 440,100" /> <!-- Top Electrode -->
                <polyline points="290,310 340,360 440,400" /> <!-- Bottom Electrode -->
            </g>

            <!-- STATE 1 LINES (Colored Dashed) -->
            <g class="state-1-lines">
                <!-- Control Wire (Purple) -->
                <line class="state-1-control" x1="50" y1="250" x2="290" y2="250" />
                <!-- Base Junction & Electrodes (Blue) -->
                <line class="state-1-inner" x1="290" y1="190" x2="290" y2="310" />
                <polyline class="state-1-inner" points="290,190 340,140 440,100" />
                <polyline class="state-1-inner" points="290,310 340,360 440,400" />
            </g>

            <!-- LABELS -->
            <g class="label">
                <!-- Control Text -->
                <text x="160" y="170" text-anchor="middle">Control</text>
                <text x="160" y="195" text-anchor="middle">wire</text>

                <!-- Electrode Text -->
                <text x="455" y="95" text-anchor="start">Electrode</text>
                <text x="455" y="425" text-anchor="start">Electrode</text>
            </g>

            <!-- INPUT / OUTPUT DYNAMIC TEXT -->
            <g font-size="24" font-weight="bold">
                <!-- Input Line -->
                <text x="50" y="360" text-anchor="start">
                    <tspan class="input-text">Input = </tspan>
                    <tspan class="value-text text-state-0 input-text">0</tspan>
                    <tspan class="value-text text-state-1 input-text">1</tspan>
                </text>
                
                <!-- Output Line -->
                <text x="160" y="440" text-anchor="start">
                    <tspan class="output-text">Output = </tspan>
                    <tspan class="value-text text-state-0 output-text">0</tspan>
                    <tspan class="value-text text-state-1 output-text">1</tspan>
                </text>
            </g>
            
        </svg>
    </div>

    <script>
        // Simple logic to toggle the state every 2.5 seconds
        const svgElement = document.querySelector('.transistor');
        let currentState = 0;

        setInterval(() => {
            currentState = currentState === 0 ? 1 : 0;
            svgElement.setAttribute('data-state', currentState);
        }, 2500);
    </script>

</body>
</html>
