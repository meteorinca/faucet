<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transistor Switch Animation</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="panel" id="transistorPanel">
      <svg class="scene" viewBox="0 0 720 520" aria-label="Transistor animation">
        <!-- Labels -->
        <text x="86" y="180" class="label">Control</text>
        <text x="95" y="218" class="label">wire</text>

        <text x="485" y="70" class="label">Electrode</text>
        <text x="500" y="445" class="label">Electrode</text>

        <text x="48" y="315" class="value inputText">Input = 0</text>
        <text x="210" y="470" class="value outputText">Output = 0</text>

        <!-- Transistor circle -->
        <circle cx="360" cy="245" r="132" class="outline" />

        <!-- Wire paths used for animation -->
        <path id="inputPath" d="M 110 245 L 280 245" class="wire inputWire" />

        <path id="topPath" d="M 405 25 L 405 126 L 280 180" class="wire outputWire" />
        <path id="middlePath" d="M 280 180 L 280 310" class="wire outputWire" />
        <path id="bottomPath" d="M 280 310 L 405 372 L 405 500" class="wire outputWire" />

        <!-- Visible transistor body -->
        <line x1="280" y1="170" x2="280" y2="320" class="wire bodyWire" />
        <line x1="280" y1="180" x2="405" y2="126" class="wire bodyWire" />
        <line x1="280" y1="310" x2="405" y2="372" class="wire bodyWire" />
        <line x1="405" y1="25" x2="405" y2="126" class="wire bodyWire" />
        <line x1="405" y1="372" x2="405" y2="500" class="wire bodyWire" />

        <!-- Particle containers -->
        <g id="inputParticles"></g>
        <g id="outputParticles"></g>
      </svg>

      <div class="controls">
        <button id="toggleBtn">Turn Input On</button>
        <button id="autoBtn" class="ghost">Auto Play</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
