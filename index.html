<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transistor Faucet Analogy — Interactive Demo</title>

    <!-- ==================== styles.css ==================== -->
    <style>
        :root {
            --bg: #08090f;
            --panel-bg: #0d0f17;
            --border: #1a1d2e;
            --text: #c8ccd8;
            --text-dim: #6b7084;
            --accent-water: #38bdf8;
            --accent-water-glow: #7dd3fc;
            --accent-electron: #f59e0b;
            --accent-electron-glow: #fbbf24;
            --accent-base: #a78bfa;
            --slider-track: #1e2132;
            --slider-fill: linear-gradient(90deg, #1e2132, #38bdf8, #f59e0b);
            --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            --font-sans: 'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            --radius: 14px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: var(--font-sans);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* ── Layout ─────────────────────────── */
        .app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: 100dvh;
        }

        .header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 24px 8px;
            gap: 10px;
            pointer-events: none;
            z-index: 10;
        }
        .header .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-water);
            box-shadow: 0 0 12px var(--accent-water-glow);
            animation: logo-pulse 2s ease-in-out infinite;
        }
        @keyframes logo-pulse {
            0%,
            100% {
                box-shadow: 0 0 8px var(--accent-water-glow);
            }
            50% {
                box-shadow: 0 0 22px var(--accent-water-glow), 0 0 40px var(--accent-water);
            }
        }
        .header h1 {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #e2e4ec;
            white-space: nowrap;
        }
        .header .badge {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--accent-base);
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.25);
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* ── Main panels ───────────────────── */
        .panels {
            flex: 1;
            display: flex;
            gap: 1px;
            background: var(--border);
            min-height: 0;
            position: relative;
        }
        .panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel-bg);
            position: relative;
            overflow: hidden;
            min-width: 0;
        }
        .panel canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .panel-label {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-dim);
            pointer-events: none;
            z-index: 5;
            background: rgba(13, 15, 23, 0.75);
            padding: 5px 14px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .panel .value-readout {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            pointer-events: none;
            z-index: 5;
            background: rgba(13, 15, 23, 0.8);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: color var(--transition);
        }
        .panel.water-panel .value-readout {
            color: var(--accent-water-glow);
        }
        .panel.transistor-panel .value-readout {
            color: var(--accent-electron-glow);
        }

        /* ── Divider glow ──────────────────── */
        .divider-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 60%;
            border-radius: 1px;
            background: transparent;
            pointer-events: none;
            z-index: 6;
            transition: box-shadow var(--transition), background var(--transition);
        }
        .divider-glow.active {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.5), 0 0 60px rgba(167, 139, 250, 0.2);
        }

        /* ── Control bar ──────────────────── */
        .control-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 16px 28px 22px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border);
            z-index: 10;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .control-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-dim);
            white-space: nowrap;
            min-width: 80px;
            text-align: right;
        }
        .region-indicator {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            padding: 6px 14px;
            border-radius: 18px;
            min-width: 90px;
            text-align: center;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .region-indicator.cutoff {
            background: rgba(107, 112, 132, 0.15);
            color: #6b7084;
            border: 1px solid rgba(107, 112, 132, 0.3);
        }
        .region-indicator.active {
            background: rgba(56, 189, 248, 0.12);
            color: #7dd3fc;
            border: 1px solid rgba(56, 189, 248, 0.35);
        }
        .region-indicator.saturation {
            background: rgba(245, 158, 11, 0.12);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.4);
            box-shadow: 0 0 18px rgba(245, 158, 11, 0.2);
        }

        /* ── Custom Slider ────────────────── */
        .slider-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 200px;
            height: 6px;
            border-radius: 3px;
            background: var(--slider-track);
            outline: none;
            cursor: pointer;
            transition: background 0.15s;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e2e4ec;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: grab;
            box-shadow: 0 0 16px rgba(167, 139, 250, 0.5), 0 4px 16px rgba(0, 0, 0, 0.5);
            transition: all var(--transition);
            position: relative;
        }
        input[type="range"]::-webkit-slider-thumb:active {
            cursor: grabbing;
            box-shadow: 0 0 28px rgba(167, 139, 250, 0.8), 0 6px 24px rgba(0, 0, 0, 0.6);
            transform: scale(1.08);
        }
        input[type="range"]::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e2e4ec;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: grab;
            box-shadow: 0 0 16px rgba(167, 139, 250, 0.5), 0 4px 16px rgba(0, 0, 0, 0.5);
        }
        .slider-ticks {
            display: flex;
            justify-content: space-between;
            width: 200px;
            position: absolute;
            top: 22px;
            left: 0;
            pointer-events: none;
            font-size: 0.55rem;
            letter-spacing: 0.03em;
            color: var(--text-dim);
        }

        /* ── Responsive ───────────────────── */
        @media (max-width: 680px) {
            .panels {
                flex-direction: column;
                gap: 1px;
            }
            .panel {
                min-height: 200px;
            }
            .divider-glow {
                width: 60%;
                height: 2px;
                top: 50%;
            }
            .control-bar {
                padding: 10px 14px 14px;
                gap: 10px;
            }
            input[type="range"] {
                width: 140px;
            }
            .slider-ticks {
                width: 140px;
            }
            .header h1 {
                font-size: 0.9rem;
            }
            .header .badge {
                font-size: 0.62rem;
                padding: 3px 8px;
            }
            .panel-label {
                font-size: 0.65rem;
                top: 8px;
                padding: 4px 10px;
            }
            .panel .value-readout {
                font-size: 0.68rem;
                bottom: 8px;
                padding: 4px 12px;
            }
        }
        @media (min-width: 1400px) {
            input[type="range"] {
                width: 300px;
            }
            .slider-ticks {
                width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="logo-dot"></div>
            <h1>Transistor · Faucet Analogy</h1>
            <span class="badge">Interactive</span>
        </div>

        <!-- Panels -->
        <div class="panels" id="panelsContainer">
            <div class="panel water-panel" id="waterPanel">
                <canvas id="faucetCanvas"></canvas>
                <span class="panel-label">💧 Faucet (Analogy)</span>
                <span class="value-readout" id="waterReadout">Flow: 0.0 L/s</span>
            </div>
            <div class="divider-glow" id="dividerGlow"></div>
            <div class="panel transistor-panel" id="transistorPanel">
                <canvas id="transistorCanvas"></canvas>
                <span class="panel-label">⚡ NPN Transistor</span>
                <span class="value-readout" id="transistorReadout">Ic: 0.00 mA</span>
            </div>
        </div>

        <!-- Control Bar -->
        <div class="control-bar">
            <span class="control-label">Base Current<br>(Handle)</span>
            <div class="slider-container">
                <input type="range" id="baseSlider" min="0" max="1000" value="0" step="1">
                <div class="slider-ticks">
                    <span>OFF</span><span>ACTIVE</span><span>SAT</span>
                </div>
            </div>
            <span class="region-indicator cutoff" id="regionIndicator">CUTOFF</span>
        </div>
    </div>

    <!-- ==================== app.js ==================== -->
    <script>
        (function() {
            // ─────────────────────────────────────
            // DOM refs
            // ─────────────────────────────────────
            const faucetCanvas = document.getElementById('faucetCanvas');
            const transistorCanvas = document.getElementById('transistorCanvas');
            const faucetCtx = faucetCanvas.getContext('2d');
            const transistorCtx = transistorCanvas.getContext('2d');
            const baseSlider = document.getElementById('baseSlider');
            const regionIndicator = document.getElementById('regionIndicator');
            const dividerGlow = document.getElementById('dividerGlow');
            const waterReadout = document.getElementById('waterReadout');
            const transistorReadout = document.getElementById('transistorReadout');
            const waterPanel = document.getElementById('waterPanel');
            const transistorPanelEl = document.getElementById('transistorPanel');

            // ─────────────────────────────────────
            // State
            // ─────────────────────────────────────
            let sliderValue = 0; // 0..1
            let targetSliderValue = 0;
            let dpr = Math.min(window.devicePixelRatio || 1, 2);

            // ─────────────────────────────────────
            // Resize / DPR handling
            // ─────────────────────────────────────
            function resizeCanvas(canvas, ctx, panelEl) {
                const rect = panelEl.getBoundingClientRect();
                const w = rect.width;
                const h = rect.height;
                canvas.width = w * dpr;
                canvas.height = h * dpr;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                return { w, h };
            }

            let faucetW, faucetH, transistorW, transistorH;

            function resizeAll() {
                const fd = resizeCanvas(faucetCanvas, faucetCtx, waterPanel);
                faucetW = fd.w;
                faucetH = fd.h;
                const td = resizeCanvas(transistorCanvas, transistorCtx, transistorPanelEl);
                transistorW = td.w;
                transistorH = td.h;
            }

            // ─────────────────────────────────────
            // Particle classes
            // ─────────────────────────────────────
            class WaterParticle {
                constructor() { this.reset(); }
                reset() {
                    this.x = 0;
                    this.y = 0;
                    this.vx = 0;
                    this.vy = 0;
                    this.life = 0;
                    this.maxLife = 0;
                    this.size = 0;
                    this.alpha = 0;
                    this.alive = false;
                }
                spawn(x, y, flowStrength) {
                    this.x = x + (Math.random() - 0.5) * flowStrength * 18;
                    this.y = y + Math.random() * 4;
                    this.vx = (Math.random() - 0.5) * flowStrength * 40;
                    this.vy = 60 + Math.random() * 200 * flowStrength + flowStrength * 300;
                    this.maxLife = 1.2 + Math.random() * 1.0;
                    this.life = this.maxLife;
                    this.size = 1.5 + Math.random() * 3.5 * (0.4 + flowStrength * 0.6);
                    this.alpha = 0.55 + Math.random() * 0.45;
                    this.alive = true;
                }
                update(dt) {
                    if (!this.alive) return;
                    this.life -= dt;
                    if (this.life <= 0) { this.alive = false; return; }
                    this.vy += 420 * dt; // gravity
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.vx *= 0.998;
                }
                draw(ctx, flowStrength) {
                    if (!this.alive) return;
                    const lifeRatio = Math.max(0, this.life / this.maxLife);
                    const alpha = this.alpha * lifeRatio;
                    const r = this.size * (0.7 + lifeRatio * 0.3);
                    const hue = 195 + Math.random() * 15;
                    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
                    grad.addColorStop(0, `rgba(180,230,255,${alpha})`);
                    grad.addColorStop(0.4, `rgba(56,189,248,${alpha * 0.85})`);
                    grad.addColorStop(1, `rgba(14,116,180,${alpha * 0.2})`);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    // tiny highlight
                    ctx.beginPath();
                    ctx.arc(this.x - r * 0.25, this.y - r * 0.25, r * 0.35, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.55})`;
                    ctx.fill();
                }
            }

            class ElectronParticle {
                constructor() { this.reset(); }
                reset() {
                    this.x = 0;
                    this.y = 0;
                    this.pathProgress = 0;
                    this.speed = 0;
                    this.size = 0;
                    this.alpha = 0;
                    this.alive = false;
                    this.trailPositions = [];
                }
                spawn(pathProgress, speed, size) {
                    this.pathProgress = pathProgress;
                    this.speed = speed;
                    this.size = size;
                    this.alpha = 0.7 + Math.random() * 0.3;
                    this.alive = true;
                    this.trailPositions = [];
                }
                update(dt, getPointOnPath) {
                    if (!this.alive) return;
                    this.pathProgress += this.speed * dt;
                    if (this.pathProgress > 1.05) { this.alive = false; return; }
                    const pt = getPointOnPath(Math.min(1, this.pathProgress));
                    this.trailPositions.push({ x: pt.x, y: pt.y, life: 0.25 });
                    // update trail lives
                    for (let i = this.trailPositions.length - 1; i >= 0; i--) {
                        this.trailPositions[i].life -= dt;
                        if (this.trailPositions[i].life <= 0) this.trailPositions.splice(i, 1);
                    }
                    if (this.trailPositions.length > 14) this.trailPositions.shift();
                    this.x = pt.x;
                    this.y = pt.y;
                }
                draw(ctx) {
                    if (!this.alive) return;
                    // draw trail
                    for (let i = 0; i < this.trailPositions.length; i++) {
                        const tp = this.trailPositions[i];
                        const lifeRatio = Math.max(0, tp.life / 0.25);
                        const r = this.size * 0.5 * lifeRatio;
                        const alpha = this.alpha * 0.5 * lifeRatio;
                        ctx.beginPath();
                        ctx.arc(tp.x, tp.y, r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(251,191,36,${alpha})`;
                        ctx.fill();
                    }
                    // draw main dot
                    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                    grad.addColorStop(0, `rgba(255,240,200,${this.alpha})`);
                    grad.addColorStop(0.35, `rgba(251,191,36,${this.alpha * 0.9})`);
                    grad.addColorStop(1, `rgba(245,120,10,${this.alpha * 0.1})`);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    // glow
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 2.2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(251,191,36,${this.alpha * 0.18})`;
                    ctx.fill();
                }
            }

            // ─────────────────────────────────────
            // Particle pools
            // ─────────────────────────────────────
            const MAX_WATER = 300;
            const waterParticles = [];
            for (let i = 0; i < MAX_WATER; i++) waterParticles.push(new WaterParticle());
            let waterSpawnTimer = 0;
            let waterSpawnInterval = 0.016;

            const MAX_ELECTRONS = 120;
            const electronParticles = [];
            for (let i = 0; i < MAX_ELECTRONS; i++) electronParticles.push(new ElectronParticle());
            let electronSpawnTimer = 0;
            let electronSpawnInterval = 0.025;

            // ─────────────────────────────────────
            // Faucet geometry (computed each frame)
            // ─────────────────────────────────────
            function getFaucetGeometry(w, h) {
                const cx = w * 0.5;
                const valveY = h * 0.28;
                const pipeTopY = h * 0.04;
                const pipeWidth = w * 0.08;
                const valveRadius = w * 0.07;
                const handleLength = w * 0.22;
                const handleWidth = w * 0.025;
                const spoutEndY = h * 0.48;
                const spoutEndX = cx;
                const spoutCurveCtrlY = valveY + (spoutEndY - valveY) * 0.55;
                const spoutOpeningY = spoutEndY;
                const basinY = h * 0.78;
                const basinW = w * 0.55;
                const basinH = h * 0.06;
                return {
                    cx,
                    valveY,
                    pipeTopY,
                    pipeWidth,
                    valveRadius,
                    handleLength,
                    handleWidth,
                    spoutEndY,
                    spoutEndX,
                    spoutCurveCtrlY,
                    spoutOpeningY,
                    basinY,
                    basinW,
                    basinH,
                    w,
                    h
                };
            }

            // ─────────────────────────────────────
            // Transistor geometry
            // ─────────────────────────────────────
            function getTransistorGeometry(w, h) {
                const cx = w * 0.5;
                const cy = h * 0.44;
                const bodyW = w * 0.18;
                const bodyH = h * 0.38;
                const baseX = cx - bodyW * 0.65;
                const baseY = cy;
                const collectorY = cy - bodyH * 0.5;
                const emitterY = cy + bodyH * 0.5;
                const nRegionH = bodyH * 0.35;
                const pRegionH = bodyH * 0.18;
                return { cx, cy, bodyW, bodyH, baseX, baseY, collectorY, emitterY, nRegionH, pRegionH, w, h };
            }

            // ─────────────────────────────────────
            // Draw faucet
            // ─────────────────────────────────────
            function drawFaucet(ctx, w, h, flowStrength) {
                const g = getFaucetGeometry(w, h);
                const {
                    cx,
                    valveY,
                    pipeTopY,
                    pipeWidth,
                    valveRadius,
                    handleLength,
                    handleWidth,
                    spoutEndY,
                    spoutEndX,
                    spoutCurveCtrlY,
                    spoutOpeningY,
                    basinY,
                    basinW,
                    basinH
                } = g;

                const handleAngle = -Math.PI / 2 + flowStrength * Math.PI * 0.48; // closed=horizontal(-90°), open≈-4°

                ctx.save();

                // ── Supply pipe (top) ──────────
                const pipeGrad = ctx.createLinearGradient(cx - pipeWidth / 2, 0, cx + pipeWidth / 2, 0);
                pipeGrad.addColorStop(0, '#2a3040');
                pipeGrad.addColorStop(0.3, '#4a5568');
                pipeGrad.addColorStop(0.5, '#5a657a');
                pipeGrad.addColorStop(0.7, '#4a5568');
                pipeGrad.addColorStop(1, '#2a3040');
                ctx.fillStyle = pipeGrad;
                ctx.fillRect(cx - pipeWidth / 2, pipeTopY, pipeWidth, valveY - valveRadius - pipeTopY);

                // pipe rim highlight
                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(cx - pipeWidth / 2, pipeTopY);
                ctx.lineTo(cx - pipeWidth / 2, valveY - valveRadius);
                ctx.moveTo(cx + pipeWidth / 2, pipeTopY);
                ctx.lineTo(cx + pipeWidth / 2, valveY - valveRadius);
                ctx.stroke();

                // ── Valve body ──────────────────
                const valveGrad = ctx.createRadialGradient(cx, valveY, valveRadius * 0.2, cx, valveY, valveRadius);
                valveGrad.addColorStop(0, '#6b7a90');
                valveGrad.addColorStop(0.55, '#3d4a5c');
                valveGrad.addColorStop(1, '#1a1f2b');
                ctx.beginPath();
                ctx.arc(cx, valveY, valveRadius, 0, Math.PI * 2);
                ctx.fillStyle = valveGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.18)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // valve inner ring
                ctx.beginPath();
                ctx.arc(cx, valveY, valveRadius * 0.55, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // ── Handle ──────────────────────
                const handlePivotX = cx + valveRadius * 0.3;
                const handlePivotY = valveY;
                const hx1 = handlePivotX + Math.cos(handleAngle) * handleLength;
                const hy1 = handlePivotY + Math.sin(handleAngle) * handleLength;
                const hPerpX = -Math.sin(handleAngle);
                const hPerpY = Math.cos(handleAngle);

                ctx.save();
                ctx.translate(handlePivotX, handlePivotY);
                ctx.rotate(handleAngle);

                // handle lever
                const leverGrad = ctx.createLinearGradient(0, -handleWidth, 0, handleWidth);
                leverGrad.addColorStop(0, '#e8eaef');
                leverGrad.addColorStop(0.35, '#c4c9d4');
                leverGrad.addColorStop(0.65, '#9aa0b0');
                leverGrad.addColorStop(1, '#5a6070');
                ctx.fillStyle = leverGrad;
                ctx.beginPath();
                ctx.roundRect(0, -handleWidth, handleLength, handleWidth * 2, handleWidth);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // handle knob at end
                const knobGrad = ctx.createRadialGradient(handleLength, 0, handleWidth * 0.4, handleLength, 0, handleWidth *
                    1.5);
                knobGrad.addColorStop(0, '#ffffff');
                knobGrad.addColorStop(0.5, '#d0d5de');
                knobGrad.addColorStop(1, '#7a8090');
                ctx.beginPath();
                ctx.arc(handleLength, 0, handleWidth * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = knobGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 0.8;
                ctx.stroke();

                ctx.restore();

                // handle pivot pin
                ctx.beginPath();
                ctx.arc(handlePivotX, handlePivotY, handleWidth * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = '#3a4050';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // ── Spout ───────────────────────
                ctx.beginPath();
                ctx.moveTo(cx, valveY + valveRadius);
                ctx.bezierCurveTo(cx + pipeWidth * 0.3, spoutCurveCtrlY, spoutEndX + pipeWidth * 0.15, spoutCurveCtrlY,
                    spoutEndX, spoutEndY);
                ctx.lineTo(spoutEndX - pipeWidth * 0.5, spoutEndY);
                ctx.bezierCurveTo(spoutEndX - pipeWidth * 0.35, spoutCurveCtrlY - pipeWidth * 0.1, cx - pipeWidth * 0.35,
                    valveY + valveRadius + pipeWidth * 0.2, cx - pipeWidth * 0.3, valveY + valveRadius);
                ctx.closePath();
                const spoutGrad = ctx.createLinearGradient(cx - pipeWidth, 0, cx + pipeWidth, 0);
                spoutGrad.addColorStop(0, '#2a3040');
                spoutGrad.addColorStop(0.4, '#4e5a6e');
                spoutGrad.addColorStop(0.6, '#4e5a6e');
                spoutGrad.addColorStop(1, '#2a3040');
                ctx.fillStyle = spoutGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1.2;
                ctx.stroke();

                // spout opening highlight
                ctx.beginPath();
                ctx.arc(spoutEndX, spoutEndY, pipeWidth * 0.28, 0, Math.PI);
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fill();

                // ── Basin ───────────────────────
                const basinTopY = basinY;
                ctx.beginPath();
                ctx.moveTo(cx - basinW / 2, basinTopY);
                ctx.lineTo(cx - basinW / 2 - basinW * 0.08, basinTopY + basinH);
                ctx.lineTo(cx + basinW / 2 + basinW * 0.08, basinTopY + basinH);
                ctx.lineTo(cx + basinW / 2, basinTopY);
                ctx.closePath();
                const basinGrad = ctx.createLinearGradient(0, basinTopY, 0, basinTopY + basinH);
                basinGrad.addColorStop(0, 'rgba(30,40,55,0.7)');
                basinGrad.addColorStop(1, 'rgba(20,28,38,0.9)');
                ctx.fillStyle = basinGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // water in basin (if flowing)
                if (flowStrength > 0.005) {
                    const waterLevel = basinTopY + 3 + flowStrength * basinH * 0.7;
                    ctx.beginPath();
                    ctx.moveTo(cx - basinW / 2 + 4, basinTopY + 3);
                    ctx.quadraticCurveTo(cx, waterLevel + Math.sin(Date.now() / 400) * 4 * flowStrength, cx + basinW / 2 - 4,
                        basinTopY + 3);
                    ctx.lineTo(cx + basinW / 2 - 6, basinTopY + basinH * 0.4);
                    ctx.quadraticCurveTo(cx, waterLevel + basinH * 0.3, cx - basinW / 2 + 6, basinTopY + basinH * 0.4);
                    ctx.closePath();
                    const poolGrad = ctx.createLinearGradient(0, basinTopY, 0, basinTopY + basinH * 0.5);
                    poolGrad.addColorStop(0, `rgba(56,189,248,${0.5 + flowStrength * 0.4})`);
                    poolGrad.addColorStop(1, 'rgba(14,100,160,0.3)');
                    ctx.fillStyle = poolGrad;
                    ctx.fill();
                }

                // ── Spout opening (where water exits) ──
                const openingX = spoutEndX;
                const openingY = spoutEndY;
                ctx.beginPath();
                ctx.arc(openingX, openingY, pipeWidth * 0.22, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fill();

                ctx.restore();

                return { openingX: spoutEndX, openingY: spoutEndY, basinTopY: basinY, basinW, basinH, handlePivotX,
                    handlePivotY, handleAngle, valveRadius, handleLength, valveY, cx };
            }

            // ─────────────────────────────────────
            // Draw transistor
            // ─────────────────────────────────────
            function drawTransistor(ctx, w, h, flowStrength) {
                const g = getTransistorGeometry(w, h);
                const { cx, cy, bodyW, bodyH, baseX, baseY, collectorY, emitterY, nRegionH, pRegionH } = g;

                ctx.save();

                // ── Glow aura when active ───────
                if (flowStrength > 0.01) {
                    const glowGrad = ctx.createRadialGradient(cx, cy, bodyW * 0.5, cx, cy, bodyW * 1.6);
                    glowGrad.addColorStop(0, `rgba(251,191,36,${flowStrength * 0.25})`);
                    glowGrad.addColorStop(0.5, `rgba(245,158,11,${flowStrength * 0.12})`);
                    glowGrad.addColorStop(1, 'rgba(245,120,10,0)');
                    ctx.fillStyle = glowGrad;
                    ctx.fillRect(cx - bodyW * 2, cy - bodyH, bodyW * 4, bodyH * 2.5);
                }

                // ── Semiconductor body ──────────
                // N region top (collector)
                const nTopY = collectorY;
                const nTopH = nRegionH;
                const bodyLeft = cx - bodyW / 2;
                const bodyRight = cx + bodyW / 2;

                // Collector N region
                const nGrad1 = ctx.createLinearGradient(0, nTopY, 0, nTopY + nTopH);
                nGrad1.addColorStop(0, '#1e3a5f');
                nGrad1.addColorStop(0.5, '#2563aa');
                nGrad1.addColorStop(1, '#1a4570');
                ctx.fillStyle = nGrad1;
                ctx.beginPath();
                ctx.roundRect(bodyLeft, nTopY, bodyW, nTopH, [6, 6, 0, 0]);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // P region (base) - middle
                const pY = nTopY + nTopH;
                const pGrad = ctx.createLinearGradient(0, pY, 0, pY + pRegionH);
                const pGlow = flowStrength;
                pGrad.addColorStop(0, `rgba(${120 + pGlow * 80},${60 + pGlow * 40},${140 + pGlow * 60},1)`);
                pGrad.addColorStop(0.5, `rgba(${150 + pGlow * 70},${80 + pGlow * 50},${170 + pGlow * 50},1)`);
                pGrad.addColorStop(1, `rgba(${110 + pGlow * 60},${55 + pGlow * 35},${135 + pGlow * 55},1)`);
                ctx.fillStyle = pGrad;
                ctx.fillRect(bodyLeft, pY, bodyW, pRegionH);
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 0.8;
                ctx.strokeRect(bodyLeft, pY, bodyW, pRegionH);

                // P region glow when base is energized
                if (flowStrength > 0.01) {
                    const pGlowGrad = ctx.createRadialGradient(cx, pY + pRegionH / 2, bodyW * 0.2, cx, pY + pRegionH / 2,
                        bodyW * 0.8);
                    pGlowGrad.addColorStop(0, `rgba(251,191,36,${flowStrength * 0.55})`);
                    pGlowGrad.addColorStop(1, 'rgba(251,191,36,0)');
                    ctx.fillStyle = pGlowGrad;
                    ctx.fillRect(bodyLeft - bodyW * 0.3, pY - bodyW * 0.2, bodyW * 1.6, pRegionH + bodyW * 0.4);
                }

                // N region bottom (emitter)
                const nBotY = pY + pRegionH;
                const nBotH = nRegionH;
                const nGrad2 = ctx.createLinearGradient(0, nBotY, 0, nBotY + nBotH);
                nGrad2.addColorStop(0, '#1a4570');
                nGrad2.addColorStop(0.5, '#2563aa');
                nGrad2.addColorStop(1, '#1e3a5f');
                ctx.fillStyle = nGrad2;
                ctx.beginPath();
                ctx.roundRect(bodyLeft, nBotY, bodyW, nBotH, [0, 0, 6, 6]);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // ── Metal contacts ──────────────
                // Collector contact (top)
                ctx.fillStyle = '#c8ccd4';
                ctx.fillRect(cx - bodyW * 0.15, collectorY - 10, bodyW * 0.3, 14);
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(cx - bodyW * 0.15, collectorY - 10, bodyW * 0.3, 14);
                // wire up
                ctx.beginPath();
                ctx.moveTo(cx, collectorY - 10);
                ctx.lineTo(cx, collectorY - 40);
                ctx.strokeStyle = '#8899aa';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                // terminal dot
                ctx.beginPath();
                ctx.arc(cx, collectorY - 44, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#d0d5de';
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Emitter contact (bottom)
                ctx.fillStyle = '#c8ccd4';
                ctx.fillRect(cx - bodyW * 0.15, emitterY - 4, bodyW * 0.3, 14);
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(cx - bodyW * 0.15, emitterY - 4, bodyW * 0.3, 14);
                // wire down with arrow
                ctx.beginPath();
                ctx.moveTo(cx, emitterY + 10);
                ctx.lineTo(cx, emitterY + 38);
                ctx.strokeStyle = '#8899aa';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                // arrowhead (emitter arrow for NPN - points OUT, i.e. downward from base)
                const arrowTipY = emitterY + 42;
                ctx.beginPath();
                ctx.moveTo(cx, arrowTipY);
                ctx.lineTo(cx - 8, arrowTipY - 10);
                ctx.lineTo(cx + 8, arrowTipY - 10);
                ctx.closePath();
                ctx.fillStyle = '#8899aa';
                ctx.fill();

                // Base contact (left side)
                ctx.fillStyle = '#c8ccd4';
                ctx.fillRect(baseX - 10, baseY - bodyW * 0.12, 14, bodyW * 0.24);
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(baseX - 10, baseY - bodyW * 0.12, 14, bodyW * 0.24);
                // wire left
                ctx.beginPath();
                ctx.moveTo(baseX - 10, baseY);
                ctx.lineTo(baseX - 38, baseY);
                ctx.strokeStyle = '#8899aa';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                // terminal dot
                ctx.beginPath();
                ctx.arc(baseX - 42, baseY, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#d0d5de';
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // ── Labels ──────────────────────
                ctx.fillStyle = '#8899aa';
                ctx.font = '600 11px "Inter","SF Pro Display",system-ui,sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('C', cx, collectorY - 50);
                ctx.fillText('E', cx, arrowTipY + 16);
                ctx.textAlign = 'right';
                ctx.fillText('B', baseX - 48, baseY + 4);

                // ── Base current glow indicator ──
                if (flowStrength > 0.01) {
                    const baseGlowGrad = ctx.createRadialGradient(baseX - 38, baseY, 2, baseX - 38, baseY, 18 + flowStrength *
                        20);
                    baseGlowGrad.addColorStop(0, `rgba(167,139,250,${0.6 + flowStrength * 0.4})`);
                    baseGlowGrad.addColorStop(1, 'rgba(167,139,250,0)');
                    ctx.fillStyle = baseGlowGrad;
                    ctx.beginPath();
                    ctx.arc(baseX - 38, baseY, 18 + flowStrength * 20, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();

                // Return path info for electron particles
                return {
                    // Path: emitter -> up through body -> collector
                    pathStartY: emitterY + 6,
                    pathEndY: collectorY - 6,
                    pathX: cx,
                    bodyLeft,
                    bodyRight,
                    bodyW,
                    pY,
                    pRegionH,
                    collectorY,
                    emitterY,
                    cx,
                    cy,
                    baseX,
                    baseY
                };
            }

            // ─────────────────────────────────────
            // Get point on electron path
            // ─────────────────────────────────────
            function makeElectronPathGetter(tGeo) {
                return function(progress) {
                    // progress 0 = emitter, progress 1 = collector
                    const y = tGeo.emitterY + 6 - progress * (tGeo.emitterY + 6 - tGeo.collectorY + 6);
                    // slight S-curve through the body
                    const xOffset = Math.sin(progress * Math.PI) * tGeo.bodyW * 0.22;
                    return {
                        x: tGeo.cx + xOffset,
                        y: y
                    };
                };
            }

            // ─────────────────────────────────────
            // Spawn particles
            // ─────────────────────────────────────
            function spawnWaterParticle(fGeom, flowStrength) {
                for (const p of waterParticles) {
                    if (!p.alive) {
                        p.spawn(fGeom.openingX, fGeom.openingY, flowStrength);
                        return;
                    }
                }
            }

            function spawnElectronParticle(tGeo, flowStrength, getPointOnPath) {
                if (flowStrength < 0.008) return;
                for (const p of electronParticles) {
                    if (!p.alive) {
                        const speed = 0.15 + flowStrength * 1.1 + Math.random() * flowStrength * 0.6;
                        const size = 1.8 + Math.random() * 4.5 * (0.3 + flowStrength * 0.7);
                        p.spawn(Math.random() * 0.04, speed, size);
                        return;
                    }
                }
            }

            // ─────────────────────────────────────
            // Draw connecting flow lines (subtle)
            // ─────────────────────────────────────
            function drawBaseConnectionGlow(ctx, tGeo, flowStrength) {
                if (flowStrength < 0.02) return;
                // Small pulsing dot on the base wire showing base current
                const bx = tGeo.baseX - 38;
                const by = tGeo.baseY;
                const pulseR = 3 + Math.sin(Date.now() / 300) * 2 + flowStrength * 8;
                const pulseAlpha = 0.4 + Math.sin(Date.now() / 250) * 0.3 + flowStrength * 0.3;
                const grad = ctx.createRadialGradient(bx, by, 0, bx, by, pulseR);
                grad.addColorStop(0, `rgba(167,139,250,${Math.min(1, pulseAlpha)})`);
                grad.addColorStop(1, 'rgba(167,139,250,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(bx, by, pulseR, 0, Math.PI * 2);
                ctx.fill();
            }

            // ─────────────────────────────────────
            // Main render
            // ─────────────────────────────────────
            let lastTime = performance.now();
            let faucetGeom = null;
            let transistorGeom = null;
            let electronPathGetter = null;

            function render(timestamp) {
                requestAnimationFrame(render);

                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.1) dt = 0.1; // clamp large dt
                lastTime = timestamp;

                // Smooth slider
                sliderValue += (targetSliderValue - sliderValue) * Math.min(1, dt * 14);
                if (Math.abs(targetSliderValue - sliderValue) < 0.0005) sliderValue = targetSliderValue;

                const flowStrength = sliderValue;

                // Resize check
                const waterRect = waterPanel.getBoundingClientRect();
                const transRect = transistorPanelEl.getBoundingClientRect();
                if (Math.abs(faucetW - waterRect.width) > 1 || Math.abs(faucetH - waterRect.height) > 1 ||
                    Math.abs(transistorW - transRect.width) > 1 || Math.abs(transistorH - transRect.height) > 1) {
                    resizeAll();
                }

                // ── Faucet canvas ───────────────
                faucetCtx.clearRect(0, 0, faucetW, faucetH);
                // subtle bg grid
                faucetCtx.strokeStyle = 'rgba(255,255,255,0.015)';
                faucetCtx.lineWidth = 0.5;
                const gridSize = 30;
                for (let gx = gridSize; gx < faucetW; gx += gridSize) {
                    faucetCtx.beginPath();
                    faucetCtx.moveTo(gx, 0);
                    faucetCtx.lineTo(gx, faucetH);
                    faucetCtx.stroke();
                }
                for (let gy = gridSize; gy < faucetH; gy += gridSize) {
                    faucetCtx.beginPath();
                    faucetCtx.moveTo(0, gy);
                    faucetCtx.lineTo(faucetW, gy);
                    faucetCtx.stroke();
                }

                faucetGeom = drawFaucet(faucetCtx, faucetW, faucetH, flowStrength);

                // Spawn water
                if (flowStrength > 0.004) {
                    waterSpawnInterval = 0.018 / (0.3 + flowStrength * 1.2);
                    waterSpawnTimer += dt;
                    const particlesPerSpawn = Math.max(1, Math.floor(flowStrength * 5));
                    while (waterSpawnTimer >= waterSpawnInterval && flowStrength > 0.004) {
                        waterSpawnTimer -= waterSpawnInterval;
                        for (let i = 0; i < particlesPerSpawn; i++) {
                            spawnWaterParticle(faucetGeom, flowStrength);
                        }
                    }
                } else {
                    waterSpawnTimer = 0;
                }

                // Update & draw water particles
                for (const p of waterParticles) {
                    if (!p.alive) continue;
                    p.update(dt);
                    // kill if below basin or off screen
                    if (p.y > faucetGeom.basinTopY + faucetGeom.basinH + 30 || p.y > faucetH + 40 || p.x < -40 || p.x >
                        faucetW + 40) {
                        p.alive = false;
                    }
                    // if in basin, slow down and fade
                    if (p.y > faucetGeom.basinTopY && p.y < faucetGeom.basinTopY + faucetGeom.basinH + 10) {
                        p.vy *= 0.7;
                        p.vx *= 0.8;
                        if (p.y > faucetGeom.basinTopY + faucetGeom.basinH * 0.6) {
                            p.life -= dt * 2.5;
                        }
                    }
                    p.draw(faucetCtx, flowStrength);
                }

                // water splash particles at basin surface
                if (flowStrength > 0.03) {
                    const splashCount = Math.floor(flowStrength * 3);
                    for (let i = 0; i < splashCount; i++) {
                        if (Math.random() < flowStrength * 0.6) {
                            const sx = faucetGeom.openingX + (Math.random() - 0.5) * faucetGeom.basinW * 0.7;
                            const sy = faucetGeom.basinTopY - Math.random() * 6;
                            faucetCtx.beginPath();
                            faucetCtx.arc(sx, sy, 1 + Math.random() * 2, 0, Math.PI * 2);
                            faucetCtx.fillStyle =
                                `rgba(180,230,255,${0.3 + Math.random() * 0.5 * flowStrength})`;
                            faucetCtx.fill();
                        }
                    }
                }

                // ── Transistor canvas ───────────
                transistorCtx.clearRect(0, 0, transistorW, transistorH);
                // subtle bg grid
                transistorCtx.strokeStyle = 'rgba(255,255,255,0.015)';
                transistorCtx.lineWidth = 0.5;
                for (let gx = gridSize; gx < transistorW; gx += gridSize) {
                    transistorCtx.beginPath();
                    transistorCtx.moveTo(gx, 0);
                    transistorCtx.lineTo(gx, transistorH);
                    transistorCtx.stroke();
                }
                for (let gy = gridSize; gy < transistorH; gy += gridSize) {
                    transistorCtx.beginPath();
                    transistorCtx.moveTo(0, gy);
                    transistorCtx.lineTo(transistorW, gy);
                    transistorCtx.stroke();
                }

                transistorGeom = drawTransistor(transistorCtx, transistorW, transistorH, flowStrength);
                electronPathGetter = makeElectronPathGetter(transistorGeom);
                drawBaseConnectionGlow(transistorCtx, transistorGeom, flowStrength);

                // Spawn electrons
                if (flowStrength > 0.006) {
                    electronSpawnInterval = 0.028 / (0.2 + flowStrength * 1.5);
                    electronSpawnTimer += dt;
                    const ePerSpawn = Math.max(1, Math.floor(flowStrength * 3.5));
                    while (electronSpawnTimer >= electronSpawnInterval && flowStrength > 0.006) {
                        electronSpawnTimer -= electronSpawnInterval;
                        for (let i = 0; i < ePerSpawn; i++) {
                            spawnElectronParticle(transistorGeom, flowStrength, electronPathGetter);
                        }
                    }
                } else {
                    electronSpawnTimer = 0;
                }

                // Update & draw electrons
                for (const p of electronParticles) {
                    if (!p.alive) continue;
                    p.update(dt, electronPathGetter);
                    p.draw(transistorCtx);
                }

                // ── Update divider glow ─────────
                if (flowStrength > 0.02) {
                    dividerGlow.classList.add('active');
                    dividerGlow.style.boxShadow =
                        `0 0 ${18 + flowStrength * 40}px rgba(167,139,250,${0.3 + flowStrength * 0.5}), 0 0 ${50 + flowStrength * 60}px rgba(167,139,250,${0.1 + flowStrength * 0.3})`;
                } else {
                    dividerGlow.classList.remove('active');
                    dividerGlow.style.boxShadow = 'none';
                }

                // ── Update readouts ─────────────
                const waterFlow = flowStrength * 4.5; // L/s
                const collectorCurrent = flowStrength * 12.0; // mA (amplified)
                waterReadout.textContent = `Flow: ${waterFlow.toFixed(1)} L/s`;
                transistorReadout.textContent = `Ic: ${collectorCurrent.toFixed(2)} mA`;

                // ── Update region indicator ─────
                regionIndicator.classList.remove('cutoff', 'active', 'saturation');
                if (flowStrength < 0.015) {
                    regionIndicator.textContent = 'CUTOFF';
                    regionIndicator.classList.add('cutoff');
                } else if (flowStrength < 0.75) {
                    regionIndicator.textContent = 'ACTIVE';
                    regionIndicator.classList.add('active');
                } else {
                    regionIndicator.textContent = 'SATURATION';
                    regionIndicator.classList.add('saturation');
                }
            }

            // ─────────────────────────────────────
            // Event handlers
            // ─────────────────────────────────────
            baseSlider.addEventListener('input', () => {
                targetSliderValue = parseInt(baseSlider.value) / 1000;
            });
            baseSlider.addEventListener('change', () => {
                targetSliderValue = parseInt(baseSlider.value) / 1000;
            });

            // Touch on faucet handle to drag
            function getFaucetHandlePos() {
                if (!faucetGeom) return null;
                const angle = -Math.PI / 2 + sliderValue * Math.PI * 0.48;
                const hpx = faucetGeom.handlePivotX;
                const hpy = faucetGeom.handlePivotY;
                const knobX = hpx + Math.cos(angle) * faucetGeom.handleLength;
                const knobY = hpy + Math.sin(angle) * faucetGeom.handleLength;
                return { knobX, knobY, hpx, hpy, angle };
            }

            function handleFaucetInteraction(clientX, clientY) {
                if (!faucetGeom) return false;
                const rect = faucetCanvas.getBoundingClientRect();
                const mx = clientX - rect.left;
                const my = clientY - rect.top;
                const hp = getFaucetHandlePos();
                if (!hp) return false;
                const distKnob = Math.hypot(mx - hp.knobX, my - hp.knobY);
                const distPivot = Math.hypot(mx - hp.hpx, my - hp.hpy);
                const handleHitRadius = faucetGeom.handleLength * 0.7;
                if (distKnob < handleHitRadius * 0.7 || distPivot < handleHitRadius) {
                    // Calculate desired angle from pivot
                    const dx = mx - hp.hpx;
                    const dy = my - hp.hpy;
                    let desiredAngle = Math.atan2(dy, dx);
                    // Clamp
                    const minAngle = -Math.PI / 2;
                    const maxAngle = -Math.PI / 2 + Math.PI * 0.48;
                    desiredAngle = Math.max(minAngle, Math.min(maxAngle, desiredAngle));
                    const newVal = (desiredAngle + Math.PI / 2) / (Math.PI * 0.48);
                    targetSliderValue = Math.max(0, Math.min(1, newVal));
                    baseSlider.value = Math.round(targetSliderValue * 1000);
                    return true;
                }
                return false;
            }

            let isDraggingFaucet = false;

            faucetCanvas.addEventListener('pointerdown', (e) => {
                if (handleFaucetInteraction(e.clientX, e.clientY)) {
                    isDraggingFaucet = true;
                    faucetCanvas.setPointerCapture(e.pointerId);
                    e.preventDefault();
                }
            });
            faucetCanvas.addEventListener('pointermove', (e) => {
                if (isDraggingFaucet) {
                    handleFaucetInteraction(e.clientX, e.clientY);
                    e.preventDefault();
                } else {
                    // hover cursor
                    if (faucetGeom) {
                        const rect = faucetCanvas.getBoundingClientRect();
                        const mx = e.clientX - rect.left;
                        const my = e.clientY - rect.top;
                        const hp = getFaucetHandlePos();
                        if (hp) {
                            const distKnob = Math.hypot(mx - hp.knobX, my - hp.knobY);
                            const distPivot = Math.hypot(mx - hp.hpx, my - hp.hpy);
                            const hitR = faucetGeom.handleLength * 0.65;
                            if (distKnob < hitR * 0.7 || distPivot < hitR) {
                                faucetCanvas.style.cursor = 'grab';
                            } else {
                                faucetCanvas.style.cursor = 'default';
                            }
                        }
                    }
                }
            });
            faucetCanvas.addEventListener('pointerup', () => {
                isDraggingFaucet = false;
                faucetCanvas.style.cursor = 'default';
            });
            faucetCanvas.addEventListener('pointerleave', () => {
                isDraggingFaucet = false;
                faucetCanvas.style.cursor = 'default';
            });

            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    targetSliderValue = Math.min(1, targetSliderValue + 0.04);
                    baseSlider.value = Math.round(targetSliderValue * 1000);
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    targetSliderValue = Math.max(0, targetSliderValue - 0.04);
                    baseSlider.value = Math.round(targetSliderValue * 1000);
                } else if (e.key === '0' || e.key === 'Home') {
                    e.preventDefault();
                    targetSliderValue = 0;
                    baseSlider.value = 0;
                } else if (e.key === '1' || e.key === 'End') {
                    e.preventDefault();
                    targetSliderValue = 1;
                    baseSlider.value = 1000;
                } else if (e.key === '5') {
                    e.preventDefault();
                    targetSliderValue = 0.5;
                    baseSlider.value = 500;
                }
            });

            // Resize observer
            const resizeObserver = new ResizeObserver(() => {
                resizeAll();
            });
            resizeObserver.observe(waterPanel);
            resizeObserver.observe(transistorPanelEl);

            window.addEventListener('resize', resizeAll);
            window.addEventListener('orientationchange', () => {
                setTimeout(resizeAll, 200);
            });

            // ─────────────────────────────────────
            // Initialize
            // ─────────────────────────────────────
            resizeAll();
            targetSliderValue = 0;
            sliderValue = 0;
            baseSlider.value = 0;
            regionIndicator.textContent = 'CUTOFF';
            regionIndicator.classList.add('cutoff');
            waterReadout.textContent = 'Flow: 0.0 L/s';
            transistorReadout.textContent = 'Ic: 0.00 mA';
            lastTime = performance.now();
            requestAnimationFrame(render);

            console.log('💧⚡ Transistor Faucet Analogy Demo ready!');
            console.log('   Drag the slider or grab the faucet handle to explore.');
            console.log('   Arrow keys, 0, 5, 1 also work.');
            console.log('   Left: Faucet analogy  |  Right: NPN Transistor');
            console.log('   Base current (handle) controls Collector-Emitter flow (water).');
        })();
    </script>
</body>
</html>
